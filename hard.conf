http {
    server {
        listen               0.0.0.0:8080;
        client_max_body_size 100M;

        error_page 400 /errors/400.html;
        error_page 403 /errors/403.html;
        error_page 404 /errors/404.html;
        error_page 405 /errors/405.html;
        error_page 413 /errors/413.html;
        error_page 500 /errors/500.html;
        error_page 502 /errors/502.html;
        error_page 503 /errors/503.html;

        location / {
            methods   GET POST DELETE;
            root      /var/www/html;
            index     index.html;
            autoindex off;
        }

        location /files {
            methods   GET;
            root      /var/www/files;
            autoindex on;
        }

        location /upload {
            methods      POST DELETE;
            upload_store /var/www/uploads;
        }

        location /old {
            return 301 /new;
        }

        location /cgi-bin {
            methods  GET POST;
            root     /var/www/cgi-bin;
            cgi_pass .py;
        }

        location /php {
            methods  GET POST;
            root     /var/www/php;
            cgi_pass .php;
        }
    }

    server {
        listen               127.0.0.1:8081;
        client_max_body_size 1K;

        error_page 404 /custom/404.html;
        error_page 500 /custom/500.html;

        location / {
            methods   GET;
            root      /var/www/site2;
            index     index.html;
            autoindex off;
        }

        location /secret {
            return 301 /;
        }

        location /data {
            methods      GET POST DELETE;
            root         /var/www/data;
            autoindex    on;
            upload_store /var/www/data/uploads;
        }
    }

    server {
        listen               127.0.0.1:9000;
        client_max_body_size 512K;

        error_page 404 /404.html;

        location / {
            methods   GET POST;
            root      /var/www/app;
            index     app.html;
            autoindex off;
        }

        location /api {
            methods  GET POST DELETE;
            root     /var/www/api;
            cgi_pass .py;
        }

        location /static {
            methods   GET;
            root      /var/www/static;
            autoindex on;
        }

        location /redirect-me {
            return 301 /api;
        }

        location /upload {
            methods      POST;
            upload_store /var/www/app/uploads;
        }
    }
}
